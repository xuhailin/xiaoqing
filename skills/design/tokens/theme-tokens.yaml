version: 1
name: XiaoQing Theme Tokens
source_of_truth:
  - frontend/src/styles/_variables.scss
  - frontend/src/styles/_design-system.scss

scales:
  spacing:
    1: 4
    2: 8
    3: 12
    4: 16
    5: 24
    6: 32
  radius:
    xs: 6
    sm: 8
    md: 12
    lg: 16
    xl: 20
    pill: 999
  shadow:
    none: none
    sm: var(--shadow-sm)
    md: var(--shadow-md)
    lg: var(--shadow-lg)
  density:
    compact:
      section_gap: 16
      panel_padding: 16
      item_gap: 8
      control_min_height: 32
      note: 适合 workbench、配置页、列表操作页
    balanced:
      section_gap: 24
      panel_padding: 16
      item_gap: 12
      control_min_height: 36
      note: 默认档，适合 chat、memory、常规内容页
    relaxed:
      section_gap: 24
      panel_padding: 24
      item_gap: 12
      control_min_height: 36
      note: 适合 memory 详情、内容阅读页

semantic_layout:
  page_types:
    chat:
      default_density: balanced
      shell_radius: none
      primary_surface: transparent-flow
      emphasis_surface: soft-card
    workbench:
      default_density: compact
      shell_radius: xl
      primary_surface: workbench-panel
      emphasis_surface: elevated-panel
    memory:
      default_density: relaxed
      shell_radius: lg
      primary_surface: quiet-panel
      emphasis_surface: subtle-card

themes:
  light:
    color:
      bg: var(--color-bg)
      surface: var(--color-surface)
      text: var(--color-text)
      text_secondary: var(--color-text-secondary)
      border: var(--color-border)
      border_light: var(--color-border-light)
      primary: var(--color-primary)
      success: var(--color-success)
      warning: var(--color-warning)
      error: var(--color-error)
    surface:
      shell_background: var(--workbench-shell-background)
      header_background: var(--workbench-header-background)
      workbench_panel: var(--workbench-surface-gradient)
      workbench_panel_soft: var(--workbench-surface-gradient-soft)
      chat_stage: var(--chat-stage-background)
      memory_hint: var(--color-panel-subtle-bg)
    shadow:
      panel: var(--workbench-surface-shadow)
      list_card: var(--color-list-card-shadow)
      chat_message: var(--chat-bubble-shadow)
    radius:
      panel: 18
      card: 16
      input: 12
      badge: 999
  dark:
    color:
      bg: var(--color-bg)
      surface: var(--color-surface)
      text: var(--color-text)
      text_secondary: var(--color-text-secondary)
      border: var(--color-border)
      border_light: var(--color-border-light)
      primary: var(--color-primary)
      success: var(--color-success)
      warning: var(--color-warning)
      error: var(--color-error)
    surface:
      shell_background: var(--workbench-shell-background)
      header_background: var(--workbench-header-background)
      workbench_panel: var(--workbench-surface-gradient)
      workbench_panel_soft: var(--workbench-surface-gradient-soft)
      chat_stage: var(--chat-stage-background)
      memory_hint: var(--color-panel-subtle-bg)
    shadow:
      panel: var(--workbench-surface-shadow)
      list_card: var(--color-list-card-shadow)
      chat_message: var(--chat-bubble-shadow)
    radius:
      panel: 18
      card: 16
      input: 12
      badge: 999

extension_rules:
  - 新 theme 只能在现有语义槽位上补值，不能重新发明一套 page type 逻辑
  - 新 token 优先补充 semantic token，不直接新增业务色
  - 允许新增 theme，但必须继续兼容 chat/workbench/memory 三类页面的默认密度映射
