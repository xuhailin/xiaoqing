services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xiaoqing}
      POSTGRES_USER: ${POSTGRES_USER:-xiaoqing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xiaoqing} -d ${POSTGRES_DB:-xiaoqing}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./.env.docker
    environment:
      PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-xiaoqing}:${POSTGRES_PASSWORD:-change-me}@db:5432/${POSTGRES_DB:-xiaoqing}?schema=public
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - backend_dev_runs:/app/backend/data/dev-runs
      - backend_books:/app/backend/assets/books
      - backend_checkin_debug:/app/backend/assets/checkin-debug
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      XQ_API_URL: ${XQ_API_URL:-}
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  backend_dev_runs:
  backend_books:
  backend_checkin_debug:
